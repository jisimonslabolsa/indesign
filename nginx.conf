server {
    listen 80;
    client_max_body_size 200M;

    location / {
        proxy_pass http://api:5000;
        proxy_set_header Host $host;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location /output/ {
        alias /app/output/;
        add_header Content-Disposition attachment;
    }
}
