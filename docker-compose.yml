version: "3.9"

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    volumes:
      - output_data:/app/output:ro
    depends_on:
      - api

  api:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
      - output_data:/app/output
    expose:
      - "5000"

  worker:
    build: .
    command: python3 worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
      - output_data:/app/output
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

volumes:
  uploads_data:
  output_data:
